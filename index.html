<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日推送</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a2a;
    --card: #1e1e30;
    --card-hover: #282845;
    --text: #e8e8e8;
    --text2: #aaa;
    --accent: #e8a849;
    --accent2: #ff6b6b;
    --border: #2a2a40;
  }
  [data-theme="light"] {
    --bg: #f4f2ed;
    --bg2: #fff;
    --card: #fff;
    --card-hover: #faf8f2;
    --text: #1a1a1a;
    --text2: #666;
    --accent: #c07828;
    --accent2: #d04040;
    --border: #e0dcd2;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .theme-btn {
    position: fixed; top: 20px; right: 20px;
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text2); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; z-index: 10;
  }
  .theme-btn:hover { border-color: var(--accent); transform: scale(1.1); }

  .hero { text-align: center; margin-bottom: 50px; }
  .hero h1 {
    font-size: 2.4em; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .hero p { color: var(--text2); font-size: 1.05em; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    max-width: 700px;
    width: 100%;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 30px;
    text-decoration: none;
    color: var(--text);
    transition: all .25s;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity .25s;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,.3);
  }
  [data-theme="light"] .card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.08); }
  .card:hover::before { opacity: 1; }

  .card-icon { font-size: 2.8em; }
  .card-title { font-size: 1.35em; font-weight: 700; }
  .card-desc { color: var(--text2); font-size: 0.92em; line-height: 1.6; }
  .card-arrow {
    color: var(--accent); font-size: 0.9em; font-weight: 600;
    margin-top: auto; padding-top: 8px;
    opacity: 0; transition: opacity .2s;
  }
  .card:hover .card-arrow { opacity: 1; }

  .footer {
    margin-top: 60px;
    color: var(--text2);
    font-size: 0.8em;
    opacity: 0.6;
  }

  @media (max-width: 500px) {
    .hero h1 { font-size: 1.8em; }
    .cards { grid-template-columns: 1fr; }
    .card { padding: 28px 24px; }
  }
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="hero">
  <h1>📡 每日推送</h1>
  <p>新闻简报 · 得到文章深度分析 · 每日更新</p>
</div>

<div class="cards">
  <a class="card" href="https://unijj28.github.io/daily-push/">
    <div class="card-icon">📰</div>
    <div class="card-title">每日简报</div>
    <div class="card-desc">澳洲 · 国际 · 中国新闻<br>AI 技术动态 · 墨尔本天气 · 市场数据</div>
    <div class="card-arrow">查看简报 →</div>
  </a>
  <a class="card" href="https://unijj28.github.io/dedao-daily/">
    <div class="card-icon">📚</div>
    <div class="card-title">得到日报</div>
    <div class="card-desc">刘怡·国际参考 · 马江博·政经参考 · 得到头条<br>深度分析 · 批判性解读 · 启发联想</div>
    <div class="card-arrow">查看分析 →</div>
  </a>
</div>

<div class="footer">Powered by OpenClaw</div>

<script>
const btn = document.getElementById('themeBtn');
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  btn.textContent = t === 'light' ? '🌙' : '☀️';
  localStorage.setItem('push-theme', t);
}
function toggleTheme() {
  setTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}
const s = localStorage.getItem('push-theme');
if (s) setTheme(s);
</script>
</body>
</html>
